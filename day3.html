<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sean Learns JS 3</title>
  </head>
  <body style="background-color: black">
    <a href="day2.html" rel="noopener noreferrer">Prev</a>
    <span>| July 11, 2026 | Next</span>
    <button id="reloadLevelBtn">Reload</button>
    <button id="nextLevelBtn">Next</button>
    <div id="board" style="display: grid" ;></div>
    <style>
      button {
        color: gray;
        border: 1px solid gray;
        background: transparent;
      }

      button:hover {
        color: rgb(173, 173, 173);
        border-color: rgb(173, 173, 173);
      }

      button:active {
        color: black;
        background: gray;
      }
    </style>
    <script>
      //Todo: new key input make forget old one
      const CELL_SIZE = 60;
      const BOARD = document.getElementById("board");
      const CELLS = { grid: [], all: [] };
      const GAME = {
        currentMap: null,
        running: true,
      };
      const MAPS = [
        {
          name: "Start Map",
          rowCount: 8,
          colCount: 12,

          player: {
            origins: [
              { row: 2, col: 1 },
              //{ row: 2, col: 2 },
              { row: 2, col: 3 },
              // { row: 5, col: 4 },
            ],
          },

          props: [
            {
              type: "bowl",
              origins: [
                { row: 5, col: 4 },
                { row: 0, col: 3 },
                { row: 5, col: 8 },
              ],
            },

            {
              type: "anvil",
              origins: [
                { row: 1, col: 1 },
                { row: 1, col: 2 },
                { row: 1, col: 3 },
                { row: 6, col: 3 },
                { row: 6, col: 4 },
                { row: 6, col: 5 },
                { row: 6, col: 6 },
                { row: 6, col: 7 },
                { row: 6, col: 8 },
                { row: 6, col: 9 },
                { row: 7, col: 1 },
                { row: 7, col: 2 },
                { row: 7, col: 3 },
                { row: 7, col: 4 },
                { row: 7, col: 5 },
              ],
            },

            {
              type: "chair",
              origins: [{ row: 4, col: 4 }],
            },
          ],
        },

        {
          name: "Second Map",
          rowCount: 10,
          colCount: 6,

          player: {
            origins: [{ row: 1, col: 1 }],
          },

          props: [],
        },

        {
          name: "Third Map",
          rowCount: 3,
          colCount: 4,

          player: {
            origins: [{ row: 1, col: 1 }],
          },

          props: [],
        },
      ];
      const PROPS = {
        anvil: {
          color: "gray",
          immovable: true,
          blocks: [
            {
              walls: ["north", "east", "south", "west"],
            },
          ],
        },
        bowl: {
          color: "#87CEEB",
          blocks: [
            {
              nestingSize: 1,
              walls: ["east", "south", "west"],
            },
          ],
        },
        chair: {
          color: "orange",
          blocks: [
            {
              walls: ["north", "east", "south", "west"],
            },
            {
              nestingSize: 2,
              offset: [1, 0],
              walls: ["north", "west"],
            },
            {
              nestingSize: 2,
              offset: [1, 1],
              walls: ["north", "east"],
            },
          ],
        },
      };
      const DIRECTIONS = {
        north: {
          row: -1,
          col: 0,
          keys: ["w", "ArrowUp"],
          type: "cardinal",
        },

        northeast: {
          row: -1,
          col: 1,
          keys: [],
          type: "diagonal",
        },

        east: {
          row: 0,
          col: 1,
          keys: ["d", "ArrowRight"],
          type: "cardinal",
        },

        southeast: {
          row: 1,
          col: 1,
          keys: [],
          type: "diagonal",
        },

        south: {
          row: 1,
          col: 0,
          keys: ["s", "ArrowDown"],
          type: "cardinal",
        },

        southwest: {
          row: 1,
          col: -1,
          keys: [],
          type: "diagonal",
        },

        west: {
          row: 0,
          col: -1,
          keys: ["a", "ArrowLeft"],
          type: "cardinal",
        },

        northwest: {
          row: -1,
          col: -1,
          keys: [],
          type: "diagonal",
        },
      };
      const INPUT = {
        north: {
          held: false,
          lastPressed: 0,
          lastMove: 0,
        },

        east: {
          held: false,
          lastPressed: 0,
          lastMove: 0,
        },

        south: {
          held: false,
          lastPressed: 0,
          lastMove: 0,
        },

        west: {
          held: false,
          lastPressed: 0,
          lastMove: 0,
        },

        shift: false,
        directionStack: [],
        holdDelay: 150, //milliseconds before a tap is considered a hold
        moveDelay: 150, //milliseconds between frames of movement
      };
      let currentLevel = 0;

      LoadGame();

      function LoadGame() {
        CreateLibraries();
        LoadMap(MAPS[currentLevel]);
        CreateUI();
        CreateListeners();
        GameLoop();

        function CreateLibraries() {
          const names = Object.keys(DIRECTIONS);

          DIRECTIONS.all = names;

          DIRECTIONS.cardinal = names.filter(
            (direction) => DIRECTIONS[direction].type === "cardinal",
          );

          DIRECTIONS.diagonal = names.filter(
            (direction) => DIRECTIONS[direction].type === "diagonal",
          );
        }

        function CreateUI() {
          const RELOAD_LEVEL_BTN = document.getElementById("reloadLevelBtn");
          const NEXT_LEVEL_BTN = document.getElementById("nextLevelBtn");
          RELOAD_LEVEL_BTN.addEventListener("click", function () {
            LoadMap(GAME.currentMap);
          });
          NEXT_LEVEL_BTN.addEventListener("click", LoadNextMap);
        }

        function CreateListeners() {
          document.addEventListener("keydown", (event) => {
            const direction = GetDirectionFromKey(event.key);

            if (direction) {
              const input = INPUT[direction];

              if (!input.held) {
                const now = Date.now();

                input.lastPressed = now;
                input.lastMove = now;
                input.pressed = true;
              }

              //remembers whats being held down if you lift up

              const stack = INPUT.directionStack;
              const index = stack.indexOf(direction);

              if (index != -1) {
                stack.splice(index, 1);
              }

              stack.push(direction);

              input.held = true;
            }

            if (event.key === "Shift") {
              INPUT.shift = true;
            }
          });

          document.addEventListener("keyup", (event) => {
            const direction = GetDirectionFromKey(event.key);

            if (direction) {
              INPUT[direction].held = false;

              const stack = INPUT.directionStack;
              const index = stack.indexOf(direction);

              if (index !== -1) {
                stack.splice(index, 1);
              }
            }

            if (event.key === "Shift") {
              INPUT.shift = false;
            }
          });
        }

        function CreateListenersOLD() {
          document.addEventListener("keydown", (event) => {
            const direction = GetDirectionFromKey(event.key);

            if (direction) {
              const input = INPUT[direction];

              if (!input.held) {
                console.log(direction);
                input.lastPressed = Date.now();
              }

              input.held = true;
            }

            if (event.key === "Shift") {
              INPUT.shift = true;
            }
          });

          document.addEventListener("keyup", (event) => {
            const direction = GetDirectionFromKey(event.key);

            if (direction) {
              INPUT[direction].held = false;
            }

            if (event.key === "Shift") {
              INPUT.shift = false;
            }
          });
        }
      }

      function GameLoop() {
        Update();
        requestAnimationFrame(GameLoop);
      }

      function Update() {
        CheckForPlayerInput();

        function CheckForPlayerInput() {
          const now = Date.now();

          const direction = INPUT.directionStack.at(-1);

          if (!direction) {
            return;
          }

          const input = INPUT[direction];

          // Initial press
          if (input.pressed) {
            RequestPlayerMove(direction);
            input.pressed = false;
            return;
          }

          // Held repeat
          const heldTime = now - input.lastPressed;

          if (heldTime >= INPUT.holdDelay) {
            if (now - input.lastMove >= INPUT.moveDelay) {
              RequestPlayerMove(direction);
            }
          }

          function RequestPlayerMove(direction) {
            console.log(
              DIRECTIONS[direction].keys[0].toUpperCase() + " pressed",
            );
            INPUT[direction].lastMove = Date.now();
            const queuedPlayers = GetPlayerQueue(GAME.player.blocks, direction);

            for (const block of queuedPlayers) {
              if (!CanPlayerMove(block, direction)) {
                console.log("blocked!");
                return;
              }
            }

            ExecuteMove(queuedPlayers, direction);
          }

          function CanPlayerMove(block, direction) {
            const currentCell = block.cell;
            const targetCell = currentCell.neighbors[direction];

            if (!CanExitCell() || !CanEnterCell()) {
              return false;
            }

            return true;

            function CanExitCell() {
              return true;
            }

            function CanEnterCell() {
              if (!targetCell) {
                return false;
              }

              // if (!targetCell.contents == []) {
              //   return false;
              // }

              return true;
            }
          }

          function ExecuteMove(blocks, direction) {
            console.log(`Moved ${direction}!`);
            for (const block of blocks) {
              const targetCell = block.cell.neighbors[direction];
              targetCell.appendChild(block.element);
              block.cell = targetCell;
            }
          }

          function GetPlayerQueue(blocks, direction) {
            return [...blocks].sort((a, b) => {
              if (direction === "east") {
                return b.cell.col - a.cell.col;
              }

              if (direction === "west") {
                return a.cell.col - b.cell.col;
              }

              if (direction === "south") {
                return b.cell.row - a.cell.row;
              }

              if (direction === "north") {
                return a.cell.row - b.cell.row;
              }
            });
          }
        }
      }

      function LoadNextMap() {
        const currentIndex = MAPS.indexOf(GAME.currentMap);
        const nextIndex = (currentIndex + 1) % MAPS.length;

        LoadMap(MAPS[nextIndex]);
      }

      function LoadMap(map) {
        GAME.currentMap = map;
        ClearMap();
        CreateCells();
        ConnectAllNeighbors();
        SpawnPlayer();
        SpawnProps();

        function ClearMap() {
          BOARD.innerHTML = "";
          CELLS.grid = [];
          CELLS.all = [];
        }

        function CreateCells() {
          BOARD.style.gridTemplateRows = `repeat(${map.rowCount}, ${CELL_SIZE}px)`;
          BOARD.style.gridTemplateColumns = `repeat(${map.colCount}, ${CELL_SIZE}px)`;

          for (let row = 0; row < map.rowCount; row++) {
            CELLS.grid[row] = [];
            for (let col = 0; col < map.colCount; col++) {
              const cell = document.createElement("div");

              cell.col = col;
              cell.row = row;
              cell.contents = [];

              BOARD.appendChild(cell);

              cell.style.background = "black";
              cell.style.border = "1px solid #333333";
              cell.style.position = "relative";

              CELLS.grid[row][col] = cell;
              CELLS.all.push(cell);

              cell.name = `[${col},${row}]`;
            }
          }
        }

        function ConnectAllNeighbors() {
          for (const cell of CELLS.all) {
            ConnectNeighbors(cell);
          }
        }

        function ConnectNeighbors(cell) {
          cell.neighbors = {};

          for (const direction of DIRECTIONS.all) {
            const data = DIRECTIONS[direction];

            const row = cell.row + data.row;
            const col = cell.col + data.col;

            if (
              row >= 0 &&
              row < map.rowCount &&
              col >= 0 &&
              col < map.colCount
            ) {
              cell.neighbors[direction] = CELLS.grid[row][col];
            } else {
              cell.neighbors[direction] = null;
            }
          }
        }

        function SpawnPlayer() {
          GAME.player = {
            blocks: [],
          };

          for (const origin of map.player.origins) {
            const cell = CELLS.grid[origin.row][origin.col];
            const playerBlock = document.createElement("div");

            playerBlock.style.position = "absolute";
            playerBlock.style.inset = "0";
            playerBlock.style.background = "limegreen";
            playerBlock.style.zIndex = 0;

            cell.appendChild(playerBlock);

            const block = {
              cell,
              element: playerBlock,
            };

            cell.contents.push(block);
            GAME.player.blocks.push(block);
          }
        }

        function SpawnProps() {
          for (const propData of map.props) {
            const prop = PROPS[propData.type];

            if (!prop) {
              console.error(
                `Map ${MAPS.indexOf(GAME.currentMap)} "${GAME.currentMap.name}" wants to create an unknown prop "${propData.type}".`,
              );
              continue;
            }

            for (const origin of propData.origins) {
              SpawnProp(prop, origin);
            }
          }

          function SpawnProp(prop, origin) {
            for (const blockData of prop.blocks) {
              const [offY, offX] = blockData.offset ?? [0, 0];
              const cell = CELLS.grid[origin.row + offY][origin.col + offX];
              cell.appendChild(CreateBlock(blockData, prop.color ?? "magenta"));
            }
          }

          function CreateBlock(blockData, color) {
            const nestingSize = blockData.nestingSize ?? 0;
            const svg = CreateSvg();
            const style = GetNestingStyle(nestingSize);
            svg.style.zIndex = nestingSize;

            if (style.fill) {
              svg.appendChild(CreateRect(0, 0, CELL_SIZE, CELL_SIZE, color));
            }

            for (const wall of blockData.walls ?? []) {
              DrawWall(svg, wall, color, style);
            }

            return svg;

            function GetNestingStyle(nestingSize) {
              const styles = {
                0: {
                  fill: true,
                  thickness: 0,
                  inset: 0,
                },

                1: {
                  fill: false,
                  thickness: 10,
                  inset: 5,
                },

                2: {
                  fill: false,
                  thickness: 7,
                  inset: 3.5,
                },

                3: {
                  fill: false,
                  thickness: 4,
                  inset: 2,
                },

                4: {
                  fill: false,
                  thickness: 2,
                  inset: 1,
                },
              };

              return styles[nestingSize];
            }
          }

          function CreateRect(x, y, width, height, fill) {
            const rect = document.createElementNS(
              "http://www.w3.org/2000/svg",
              "rect",
            );

            rect.setAttribute("x", x);
            rect.setAttribute("y", y);
            rect.setAttribute("width", width);
            rect.setAttribute("height", height);
            rect.setAttribute("fill", fill);

            return rect;
          }

          function CreateSvg() {
            const svg = document.createElementNS(
              "http://www.w3.org/2000/svg",
              "svg",
            );

            svg.setAttribute("width", CELL_SIZE);
            svg.setAttribute("height", CELL_SIZE);
            svg.style.position = "absolute";

            return svg;
          }
        }

        function DrawWall(svg, direction, color, style) {
          const line = document.createElementNS(
            "http://www.w3.org/2000/svg",
            "line",
          );

          const MIN = style.inset;
          const MAX = CELL_SIZE - style.inset;

          if (direction === "north") {
            line.setAttribute("x1", MIN);
            line.setAttribute("y1", MIN);
            line.setAttribute("x2", MAX);
            line.setAttribute("y2", MIN);
          }

          if (direction === "east") {
            line.setAttribute("x1", MAX);
            line.setAttribute("y1", MIN);
            line.setAttribute("x2", MAX);
            line.setAttribute("y2", MAX);
          }

          if (direction === "south") {
            line.setAttribute("x1", MIN);
            line.setAttribute("y1", MAX);
            line.setAttribute("x2", MAX);
            line.setAttribute("y2", MAX);
          }

          if (direction === "west") {
            line.setAttribute("x1", MIN);
            line.setAttribute("y1", MIN);
            line.setAttribute("x2", MIN);
            line.setAttribute("y2", MAX);
          }

          line.setAttribute("stroke", color);
          line.setAttribute("stroke-width", style.thickness);

          svg.appendChild(line);
        }
      }

      function GetDirectionFromKey(key) {
        return DIRECTIONS.all.find((direction) =>
          DIRECTIONS[direction].keys.includes(key),
        );
      }
    </script>
  </body>
</html>
