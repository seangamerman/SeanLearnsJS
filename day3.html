<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SlimeGame</title>
  </head>
  <body style="background-color: black">
    <a href="day2.html" rel="noopener noreferrer">Prev</a>
    <span>| July 11, 2026 | Next</span>
    <button id="reloadLevelBtn">Reload</button>
    <button id="nextLevelBtn">Next</button>
    <div id="board" style="display: grid" ;></div>
    <style>
      button {
        color: gray;
        border: 1px solid gray;
        background: transparent;
      }

      button:hover {
        color: rgb(173, 173, 173);
        border-color: rgb(173, 173, 173);
      }

      button:active {
        color: black;
        background: gray;
      }
    </style>
    <script>
      const CELL_SIZE = 60;
      const BOARD = document.getElementById("board");
      const CELLS = { grid: [], all: [] };
      const GAME = {
        currentMap: null,
        running: true,
        entities: [],
      };
      const MAPS = [
        {
          name: "Start Map",
          rowCount: 9,
          colCount: 12,

          entities: [
            {
              type: "slime",
              origins: [
                { row: 4, col: 6 },
                { row: 4, col: 5 },
                { row: 5, col: 5 },
                { row: 5, col: 6 },
              ],
            },
            {
              type: "cup",
              origins: [{ row: 3, col: 7 }],
            },
            {
              type: "bucket",
              origins: [
                { row: 3, col: 8 },
                { row: 5, col: 9 },
              ],
            },

            {
              type: "box",
              origins: [
                { row: 4, col: 7 },
                { row: 4, col: 8 },
                { row: 5, col: 7 },
              ],
            },
            {
              type: "ground",
              origins: [
                { row: 0, col: 11 },
                { row: 1, col: 10 },
                { row: 0, col: 6 },
                { row: 0, col: 5 },
                { row: 1, col: 0 },
                { row: 2, col: 0 },
                { row: 2, col: 1 },
                { row: 3, col: 0 },
                { row: 6, col: 1 },
                { row: 6, col: 2 },
                { row: 6, col: 4 },
                { row: 6, col: 5 },
                { row: 6, col: 6 },
                { row: 6, col: 7 },
                { row: 6, col: 8 },
                { row: 6, col: 9 },
                { row: 7, col: 1 },
                { row: 7, col: 2 },
                { row: 7, col: 3 },
                { row: 7, col: 4 },
                { row: 7, col: 5 },
              ],
            },

            {
              type: "chair",
              origins: [{ row: 4, col: 2 }],
            },
          ],
        },

        {
          name: "Second Map",
          rowCount: 10,
          colCount: 6,

          entities: [
            {
              type: "slime",
              origins: [{ row: 1, col: 1 }],
            },
            {
              type: "cup",
              origins: [{ row: 1, col: 2 }],
            },
          ],
        },

        {
          name: "Third Map",
          rowCount: 3,
          colCount: 4,

          entities: [
            {
              type: "slime",
              origins: [{ row: 1, col: 1 }],
            },
            {
              type: "anvil",
              origins: [{ row: 1, col: 2 }],
            },
          ],
        },
      ];
      const PREFABS = {
        slime: {
          name: "slime",
          color: "limegreen",
          movement: "playable",
          blocks: [
            {
              walls: ["north", "east", "south", "west"],
            },
          ],
        },
        ground: {
          name: "ground",
          color: "gray",
          movement: "fixed",
          blocks: [
            {
              nestingSize: 4,
              walls: ["north", "east", "south", "west"],
            },
          ],
        },
        box: {
          name: "box",
          color: "#977043", //caramel beige
          movement: "pushable",
          blocks: [
            {
              walls: ["north", "east", "south", "west"],
            },
          ],
        },
        cup: {
          name: "cup",
          color: "#87CEEB",
          movement: "pushable",
          blocks: [
            {
              nestingSize: 1,
              walls: ["east", "south", "west"],
            },
          ],
        },
        bucket: {
          name: "bucket",
          color: "purple",
          movement: "pushable",
          blocks: [
            {
              nestingSize: 2,
              walls: ["north", "east", "south"],
            },
          ],
        },
        chair: {
          name: "chair",
          color: "orange",
          movement: "pushable",
          blocks: [
            {
              walls: ["north", "east", "south", "west"],
            },
            {
              nestingSize: 3,
              offset: [1, 0],
              walls: ["north", "west"],
            },
            {
              nestingSize: 3,
              offset: [1, 1],
              walls: ["north", "east"],
            },
          ],
        },
      };
      const DIRECTIONS = {
        north: {
          row: -1,
          col: 0,
          keys: ["w", "ArrowUp"],
          type: "cardinal",
          opposite: "south",
        },

        northeast: {
          row: -1,
          col: 1,
          keys: [],
          type: "diagonal",
          opposite: "southwest",
        },

        east: {
          row: 0,
          col: 1,
          keys: ["d", "ArrowRight"],
          type: "cardinal",
          opposite: "west",
        },

        southeast: {
          row: 1,
          col: 1,
          keys: [],
          type: "diagonal",
          opposite: "northwest",
        },

        south: {
          row: 1,
          col: 0,
          keys: ["s", "ArrowDown"],
          type: "cardinal",
          opposite: "north",
        },

        southwest: {
          row: 1,
          col: -1,
          keys: [],
          type: "diagonal",
          opposite: "northeast",
        },

        west: {
          row: 0,
          col: -1,
          keys: ["a", "ArrowLeft"],
          type: "cardinal",
          opposite: "east",
        },

        northwest: {
          row: -1,
          col: -1,
          keys: [],
          type: "diagonal",
          opposite: "southeast",
        },
      };
      const INPUT = {
        north: {
          held: false,
          lastPressed: 0,
          lastMove: 0,
        },

        east: {
          held: false,
          lastPressed: 0,
          lastMove: 0,
        },

        south: {
          held: false,
          lastPressed: 0,
          lastMove: 0,
        },

        west: {
          held: false,
          lastPressed: 0,
          lastMove: 0,
        },

        shift: false,
        directionStack: [],
        holdDelay: 100, //milliseconds before a tap is considered a hold
        moveDelay: 100, //milliseconds between frames of movement
      };
      let currentLevel = 0;

      LoadGame();

      function LoadGame() {
        CreateLibraries();
        LoadMap(MAPS[currentLevel]);
        CreateUI();
        CreateListeners();
        GameLoop();

        function CreateLibraries() {
          const names = Object.keys(DIRECTIONS);

          DIRECTIONS.all = names;

          DIRECTIONS.cardinal = names.filter(
            (direction) => DIRECTIONS[direction].type === "cardinal",
          );

          DIRECTIONS.diagonal = names.filter(
            (direction) => DIRECTIONS[direction].type === "diagonal",
          );
        }

        function CreateUI() {
          const RELOAD_LEVEL_BTN = document.getElementById("reloadLevelBtn");
          const NEXT_LEVEL_BTN = document.getElementById("nextLevelBtn");
          RELOAD_LEVEL_BTN.addEventListener("click", function () {
            LoadMap(GAME.currentMap);
          });
          NEXT_LEVEL_BTN.addEventListener("click", LoadNextMap);
        }

        function CreateListeners() {
          document.addEventListener("keydown", (event) => {
            const direction = GetDirectionFromKey(event.key);

            if (direction) {
              const input = INPUT[direction];

              if (!input.held) {
                const now = Date.now();

                input.lastPressed = now;
                input.lastMove = now;
                input.pressed = true;
              }

              const stack = INPUT.directionStack;
              const index = stack.indexOf(direction);

              if (index != -1) {
                stack.splice(index, 1);
              }

              stack.push(direction);

              input.held = true;
            }

            if (event.key === "Shift") {
              INPUT.shift = true;
            }
          });

          document.addEventListener("keyup", (event) => {
            const direction = GetDirectionFromKey(event.key);

            if (direction) {
              INPUT[direction].held = false;

              const stack = INPUT.directionStack;
              const index = stack.indexOf(direction);

              if (index !== -1) {
                stack.splice(index, 1);
              }
            }

            if (event.key === "Shift") {
              INPUT.shift = false;
            }
          });
        }
      }

      function GameLoop() {
        Update();
        requestAnimationFrame(GameLoop);
      }

      function Update() {
        CheckForInput();

        function CheckForInput() {
          const now = Date.now();
          const direction = INPUT.directionStack.at(-1);

          if (!direction) {
            return;
          }

          const input = INPUT[direction];

          // Key tap
          if (input.pressed) {
            RequestPlayerMove(direction);
            input.pressed = false;
            return;
          }

          // Key hold
          if (
            now - input.lastPressed >= INPUT.holdDelay &&
            now - input.lastMove >= INPUT.moveDelay
          ) {
            RequestPlayerMove(direction);
          }

          function GetBlockQueue(blocks, direction) {
            return [...blocks].sort((a, b) => {
              if (direction === "east") {
                return b.cell.col - a.cell.col;
              }

              if (direction === "west") {
                return a.cell.col - b.cell.col;
              }

              if (direction === "south") {
                return b.cell.row - a.cell.row;
              }

              if (direction === "north") {
                return a.cell.row - b.cell.row;
              }
            });
          }

          function RequestPlayerMove(direction) {
            INPUT[direction].lastMove = Date.now();

            const playerBlocks = GAME.players.flatMap(
              (player) => player.blocks,
            );

            const playerQueue = GetBlockQueue(playerBlocks, direction);

            let movementGroups = [];

            for (const player of playerQueue) {
              let proposedMovementGroup = GetProposedMovementGroup(
                player,
                direction,
              );

              let allCanMove = true;

              for (const block of proposedMovementGroup) {
                if (!CanMove(block, direction)) {
                  allCanMove = false;
                  break;
                }
              }
              if (allCanMove) {
                movementGroups.push(...proposedMovementGroup);
              }

              function GetProposedMovementGroup(player, direction) {
                const group = [];
                AddToGroup(player);
                return group;

                function AddToGroup(block) {
                  //Don't move an object twice
                  if (group.includes(block)) {
                    return;
                  } else {
                    group.push(block);
                  }

                  const cellmates = block.cell.contents.filter(
                    (cellmate) => cellmate !== block,
                  );

                  for (const cellmate of cellmates) {
                    if (cellmate.nestingSize > block.nestingSize) {
                      //Cellmate is larger

                      if (cellmate.walls.includes(direction)) {
                        //Cellmate has a wall blocking my exit
                        AddToGroup(cellmate);
                      }
                    } else if (cellmate.nestingSize < block.nestingSize) {
                      //Cellmate is smaller

                      if (
                        block.walls.includes(DIRECTIONS[direction].opposite)
                      ) {
                        //Cellmate added because block has a back wall trapping them
                        AddToGroup(cellmate);
                      }
                    } else {
                      //Cellmate is the same size as me- uh oh!
                      console.error(
                        `Level design error: ${cellmate.entity.prefab.name} and ${block.entity.prefab.name} are both nestingSize ${block.nestingSize} and are sharing a cell`,
                      );
                    }
                  }
                  //Must have targetCell to proceed checking
                  const targetCell = block.cell.neighbors[direction];

                  if (!targetCell) {
                    return;
                  }

                  const obstacles = [...targetCell.contents];

                  for (const obstacle of obstacles) {
                    if (obstacle.nestingSize < block.nestingSize) {
                      //Obstacle is small

                      if (!block.walls.includes(direction)) {
                        //Block is open to nest around obstacle
                        continue;
                      } else {
                        AddToGroup(obstacle);
                      }
                    } else if (obstacle.nestingSize > block.nestingSize) {
                      // Obstacle is big

                      if (
                        !obstacle.walls.includes(DIRECTIONS[direction].opposite)
                      ) {
                        //Obstacle is open to nest around block
                        continue;
                      }
                      AddToGroup(obstacle);
                    } else {
                      //Obstacle and block are same size
                      AddToGroup(obstacle);
                    }
                  }

                  for (const sibling of block.entity.blocks) {
                    if (!group.includes(sibling)) {
                      AddToGroup(sibling);
                    }
                  }
                }
              }

              function CanMove(block, direction) {
                const targetCell = block.cell.neighbors[direction];

                //Don't go off the edge of the board
                if (!targetCell) {
                  return false;
                }

                //Don't move a fixed object
                if (block.entity.prefab.movement === "fixed") {
                  return false;
                }

                return true;
              }

              function ExecuteMove(blocks, direction) {
                for (const block of blocks) {
                  const targetCell = block.cell.neighbors[direction];
                  block.cell.contents.splice(
                    block.cell.contents.indexOf(block),
                    1,
                  );
                  targetCell.contents.push(block);
                  targetCell.appendChild(block.blockDiv);
                  block.cell = targetCell;
                }
              }
            }

            movementGroups = [...new Set(movementGroups)];
            ExecuteMove(movementGroups, direction);
          }
        }
      }

      function LoadNextMap() {
        const currentIndex = MAPS.indexOf(GAME.currentMap);
        const nextIndex = (currentIndex + 1) % MAPS.length;

        LoadMap(MAPS[nextIndex]);
      }

      function LoadMap(map) {
        GAME.currentMap = map;
        ClearMap();
        CreateCells();
        ConnectAllNeighbors();
        SpawnEntities();

        function ClearMap() {
          BOARD.innerHTML = "";
          CELLS.grid = [];
          CELLS.all = [];
          GAME.entities = [];
        }

        function CreateCells() {
          BOARD.style.gridTemplateRows = `repeat(${map.rowCount}, ${CELL_SIZE}px)`;
          BOARD.style.gridTemplateColumns = `repeat(${map.colCount}, ${CELL_SIZE}px)`;

          for (let row = 0; row < map.rowCount; row++) {
            CELLS.grid[row] = [];
            for (let col = 0; col < map.colCount; col++) {
              const cell = document.createElement("div");

              cell.col = col;
              cell.row = row;
              cell.contents = [];

              BOARD.appendChild(cell);

              cell.style.background = "black";
              cell.style.border = "1px solid #333333";
              cell.style.position = "relative";

              CELLS.grid[row][col] = cell;
              CELLS.all.push(cell);

              cell.name = `[${col},${row}]`;
            }
          }
        }

        function ConnectAllNeighbors() {
          for (const cell of CELLS.all) {
            ConnectNeighbors(cell);
          }
        }

        function ConnectNeighbors(cell) {
          cell.neighbors = {};

          for (const direction of DIRECTIONS.all) {
            const data = DIRECTIONS[direction];

            const row = cell.row + data.row;
            const col = cell.col + data.col;

            if (
              row >= 0 &&
              row < map.rowCount &&
              col >= 0 &&
              col < map.colCount
            ) {
              cell.neighbors[direction] = CELLS.grid[row][col];
            } else {
              cell.neighbors[direction] = null;
            }
          }
        }

        function SpawnEntities() {
          for (const prefabData of map.entities) {
            const prefab = PREFABS[prefabData.type];

            if (!prefab) {
              console.error(
                `Map ${MAPS.indexOf(GAME.currentMap)} "${GAME.currentMap.name}" contains unknown prop "${propData.type}".`,
              );
              continue;
            }
            for (const origin of prefabData.origins) {
              SpawnEntity(prefab, origin);
            }
          }

          GAME.players = GAME.entities.filter(
            (entity) => entity.prefab.movement === "playable",
          );

          function SpawnEntity(prefab, origin) {
            const entity = {
              id: GAME.entities.length,

              prefab,

              blocks: [],

              canMove(direction) {
                if (this.prefab.movement === "fixed") {
                  return false;
                }
                return true;
              },
            };

            GAME.entities.push(entity);

            for (const block of prefab.blocks) {
              const [offY, offX] = block.offset ?? [0, 0];
              const cell = CELLS.grid[origin.row + offY][origin.col + offX];
              const blockDiv = RenderBlock(block, prefab.color ?? "magenta");

              const blockGameObject = {
                type: "block",
                entity,
                walls: block.walls ?? [],
                nestingSize: block.nestingSize ?? 0,
                cell,
                blockDiv,
              };

              entity.blocks.push(blockGameObject);
              cell.contents.push(blockGameObject);
              cell.appendChild(blockDiv);
            }
          }

          function RenderBlock(block, color) {
            const nestingSize = block.nestingSize ?? 0;
            const svg = CreateSvg();
            const style = GetNestingStyle(nestingSize);
            svg.style.zIndex = nestingSize;

            if (style.fill) {
              svg.appendChild(CreateRect(0, 0, CELL_SIZE, CELL_SIZE, color));
            }

            for (const wall of block.walls ?? []) {
              DrawWall(svg, wall, color, style);
            }

            return svg;

            function GetNestingStyle(nestingSize) {
              const styles = {
                0: {
                  fill: true,
                  thickness: 0,
                  inset: 0,
                },

                1: {
                  fill: false,
                  thickness: 10,
                  inset: 5,
                },

                2: {
                  fill: false,
                  thickness: 7,
                  inset: 3.5,
                },

                3: {
                  fill: false,
                  thickness: 4,
                  inset: 2,
                },

                4: {
                  fill: true,
                  thickness: 0,
                  inset: 0,
                },
              };

              return styles[nestingSize] ?? styles[0];
            }
          }

          function CreateRect(x, y, width, height, fill) {
            const rect = document.createElementNS(
              "http://www.w3.org/2000/svg",
              "rect",
            );

            rect.setAttribute("x", x);
            rect.setAttribute("y", y);
            rect.setAttribute("width", width);
            rect.setAttribute("height", height);
            rect.setAttribute("fill", fill);

            return rect;
          }

          function CreateSvg() {
            const svg = document.createElementNS(
              "http://www.w3.org/2000/svg",
              "svg",
            );

            svg.setAttribute("width", CELL_SIZE);
            svg.setAttribute("height", CELL_SIZE);
            svg.style.position = "absolute";

            return svg;
          }
        }

        function DrawWall(svg, direction, color, style) {
          const line = document.createElementNS(
            "http://www.w3.org/2000/svg",
            "line",
          );

          const MIN = style.inset;
          const MAX = CELL_SIZE - style.inset;

          if (direction === "north") {
            line.setAttribute("x1", MIN);
            line.setAttribute("y1", MIN);
            line.setAttribute("x2", MAX);
            line.setAttribute("y2", MIN);
          }

          if (direction === "east") {
            line.setAttribute("x1", MAX);
            line.setAttribute("y1", MIN);
            line.setAttribute("x2", MAX);
            line.setAttribute("y2", MAX);
          }

          if (direction === "south") {
            line.setAttribute("x1", MIN);
            line.setAttribute("y1", MAX);
            line.setAttribute("x2", MAX);
            line.setAttribute("y2", MAX);
          }

          if (direction === "west") {
            line.setAttribute("x1", MIN);
            line.setAttribute("y1", MIN);
            line.setAttribute("x2", MIN);
            line.setAttribute("y2", MAX);
          }

          line.setAttribute("stroke", color);
          line.setAttribute("stroke-width", style.thickness);

          svg.appendChild(line);
        }
      }

      function GetDirectionFromKey(key) {
        return DIRECTIONS.all.find((direction) =>
          DIRECTIONS[direction].keys.includes(key),
        );
      }
    </script>
  </body>
</html>
